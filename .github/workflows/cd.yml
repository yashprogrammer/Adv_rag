name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      ECS_SERVICE: ${{ vars.ECS_SERVICE }}
      ECS_TASK_FAMILY: ${{ vars.ECS_TASK_FAMILY }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-cd
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY"
          docker build -t "$IMAGE_URI:$IMAGE_TAG" -t "$IMAGE_URI:latest" .
          docker push "$IMAGE_URI:$IMAGE_TAG"
          docker push "$IMAGE_URI:latest"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Render ECS task definition
        run: |
          set -euo pipefail
          aws ecs describe-task-definition \
            --task-definition "$ECS_TASK_FAMILY" \
            --region "$AWS_REGION" \
            --query 'taskDefinition' \
            > task-definition.json

          jq --arg IMAGE "$IMAGE_URI:$IMAGE_TAG" '
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            | .containerDefinitions[0].image = $IMAGE
          ' task-definition.json > task-definition-rendered.json

      - name: Deploy ECS service
        env:
          ECS_TASK_DEFINITION_PATH: task-definition-rendered.json
        run: |
          chmod +x ./scripts/deploy_ecs.sh
          ./scripts/deploy_ecs.sh

      - name: Smoke test
        run: |
          set -euo pipefail
          ALB_DNS="$(aws elbv2 describe-load-balancers \
            --names "${ECS_CLUSTER%-cluster}-alb" \
            --region "$AWS_REGION" \
            --query 'LoadBalancers[0].DNSName' \
            --output text)"
          echo "ALB DNS: $ALB_DNS"
          for i in {1..12}; do
            if curl -sf "http://$ALB_DNS/admin/health" >/dev/null; then
              echo "✅ Smoke test passed"
              exit 0
            fi
            echo "Waiting for service... attempt $i/12"
            sleep 15
          done
          echo "❌ Smoke test failed"
          exit 1
