# Golden dataset for the Advanced RAG e-commerce copilot.
#
# Schema (per entry):
#   id:                       unique stable ID (q-XXX)
#   question:                 the actual user input
#   intent:                   rag | sql | hybrid | web_fallback
#   golden_sources:           expected source files (or "query_results" for SQL)
#   golden_answer_keywords:   strings the correct answer should contain (case-insensitive substring match)
#   demonstrates_feature:     baseline | sparse | dense | hybrid | rerank | hyde | crag | self_rag | sql | hybrid_rag_sql | security
#   expected_baseline:        pass | fail   — does the naive RAG profile pass this Q?
#   expected_with_feature:    pass          — does the targeted-feature profile pass this Q?
#   notes:                    one-line why this Q exposes the gap (or works)
#
# Profile → expected behavior matrix is encoded by `expected_baseline` and `expected_with_feature`.
# Feature mapping enforced in eval/run_ragas.py via demonstrates_feature.

# ---------- BASELINE (control — naive RAG should pass) ----------

- id: q-001
  question: "What is your return policy?"
  intent: rag
  golden_sources:
    - refund-policy.pdf
  golden_answer_keywords:
    - "30 days"
    - refund
    - return
  demonstrates_feature: baseline
  expected_baseline: pass
  expected_with_feature: pass
  notes: "Direct keyword match — naive dense RAG should retrieve refund-policy.pdf cleanly."

- id: q-002
  question: "How long is the warranty on your products?"
  intent: rag
  golden_sources:
    - warranty.pdf
  golden_answer_keywords:
    - "1-year"
    - warranty
    - limited
  demonstrates_feature: baseline
  expected_baseline: pass
  expected_with_feature: pass
  notes: "Direct semantic match — control case for warranty.pdf."

# ---------- SPARSE BEATS DENSE (rare-token literal match) ----------

- id: q-003
  question: "Tell me about order ORD-2024-0042"
  intent: sql
  golden_sources:
    - query_results
  golden_answer_keywords:
    - "ORD-2024-0042"
  demonstrates_feature: sparse
  expected_baseline: fail
  expected_with_feature: pass
  notes: "Dense embedding of a synthetic order ID is noise; sparse/BM25 finds the literal token in the orders table or doc index."

- id: q-004
  question: "Find the policy that mentions a 'restocking fee'"
  intent: rag
  golden_sources:
    - refund-policy.pdf
  golden_answer_keywords:
    - "restocking fee"
    - "10%"
  demonstrates_feature: sparse
  expected_baseline: fail
  expected_with_feature: pass
  notes: "Exact-phrase retrieval. Dense ranks loosely-related refund chunks above the one with the literal phrase; sparse pins it."

# ---------- DENSE BEATS SPARSE (paraphrase / semantic intent) ----------

- id: q-005
  question: "How do I send back something I bought that I don't want anymore?"
  intent: rag
  golden_sources:
    - refund-policy.pdf
  golden_answer_keywords:
    - return
    - refund
    - "30 days"
  demonstrates_feature: dense
  expected_baseline: pass
  expected_with_feature: pass
  notes: "BM25 misses — none of 'send back', 'don't want' appear in refund-policy.pdf. Dense embeds intent → close match. Confirms why hybrid keeps dense."

- id: q-006
  question: "Can I get my money back after buying something?"
  intent: rag
  golden_sources:
    - refund-policy.pdf
  golden_answer_keywords:
    - refund
    - return
  demonstrates_feature: dense
  expected_baseline: pass
  expected_with_feature: pass
  notes: "Pure semantic paraphrase of refund — sparse ranks lower, dense nails it."

# ---------- HYBRID (needs both modes — fails if either is missing) ----------

- id: q-007
  question: "What's the warranty on SKU ABC-12345?"
  intent: rag
  golden_sources:
    - warranty.pdf
  golden_answer_keywords:
    - "ABC-12345"
    - warranty
    - "1-year"
  demonstrates_feature: hybrid
  expected_baseline: fail
  expected_with_feature: pass
  notes: "Needs sparse to anchor 'ABC-12345' AND dense to anchor 'warranty' semantic. RRF fuses → top result has both."

- id: q-008
  question: "Refund policy for product PROD-0099 — how many days do I have?"
  intent: rag
  golden_sources:
    - refund-policy.pdf
  golden_answer_keywords:
    - "PROD-0099"
    - "30 days"
    - refund
  demonstrates_feature: hybrid
  expected_baseline: fail
  expected_with_feature: pass
  notes: "Product ID literal + refund concept — hybrid mode required."

# ---------- RERANK (top-5 has noise; cross-encoder promotes the precise chunk) ----------

- id: q-009
  question: "How long until I get my stuff after I order?"
  intent: rag
  golden_sources:
    - shipping-policy.pdf
  golden_answer_keywords:
    - "3-5 business days"
    - shipping
    - delivery
  demonstrates_feature: rerank
  expected_baseline: fail
  expected_with_feature: pass
  notes: "Vague time question — top-5 dense returns mix of shipping/refund/warranty (all loosely 'time-related'). Reranker scores shipping chunk highest."

- id: q-010
  question: "When will I receive my purchase?"
  intent: rag
