# ---------- HYDE (vague conceptual; zero keyword overlap; query expansion helps) ----------

- id: q-011
  question: "Is there a way to undo a purchase?"
  intent: rag
  golden_sources:
    - refund-policy.pdf
  golden_answer_keywords:
    - refund
    - return
    - "30 days"
  demonstrates_feature: hyde
  expected_baseline: fail
  expected_with_feature: pass
  notes: "Zero keyword overlap with 'refund'. Hybrid alone struggles. HyDE generates 'Yes, our refund policy lets you return within 30 days...' → embed THAT → matches refund-policy.pdf."

- id: q-012
  question: "What if I change my mind a few days after buying?"
  intent: rag
  golden_sources:
    - refund-policy.pdf
  golden_answer_keywords:
    - refund
    - return
    - "30 days"
  demonstrates_feature: hyde
  expected_baseline: fail
  expected_with_feature: pass
  notes: "Conceptual paraphrase — HyDE expansion bridges to refund vocabulary."

# ---------- CRAG (out-of-distribution; web fallback rescues) ----------

- id: q-013
  question: "What's the tracking status of UPS shipment 1Z999AA10123456784?"
  intent: web_fallback
  golden_sources:
    - tavily_web
  golden_answer_keywords:
    - UPS
    - tracking
  demonstrates_feature: crag
  expected_baseline: fail
  expected_with_feature: pass
  notes: "Tracking number not in our docs/db — naive RAG hallucinates from generic shipping-policy.pdf. CRAG grader flags chunks as irrelevant → Tavily web fallback → web-cited answer (or 'not found in our records, web suggests...')."

- id: q-014
  question: "Are there any current weather events affecting deliveries this week?"
  intent: web_fallback
  golden_sources:
    - tavily_web
  golden_answer_keywords:
    - weather
    - delivery
  demonstrates_feature: crag
  expected_baseline: fail
  expected_with_feature: pass
  notes: "Completely OOD — no relevant chunks in any seed PDF. CRAG → Tavily fallback for current info."

# ---------- SELF-RAG (vague query; reflect-refine improves answer) ----------

- id: q-015
  question: "What's our policy?"
  intent: rag
  golden_sources:
    - refund-policy.pdf
    - shipping-policy.pdf
    - warranty.pdf
  golden_answer_keywords:
    - refund
    - shipping
    - warranty
  demonstrates_feature: self_rag
  expected_baseline: fail
  expected_with_feature: pass
  notes: "Deliberately vague. Naive returns generic 'we have many policies'. Self-RAG reflects (score < 0.8) → refines to 'list customer-facing policies' → re-retrieves all policy docs → structured multi-policy answer."

- id: q-016
  question: "Tell me about returns"
  intent: rag
  golden_sources:
