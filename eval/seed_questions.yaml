# Golden dataset for the Advanced RAG Kubernetes IT-Operations Copilot.
#
# Schema (per entry):
#   id:                       unique stable ID (q-XXX)
#   question:                 the actual user input
#   intent:                   rag | sql | hybrid | web_fallback
#   golden_sources:           expected source files (or "query_results" for SQL)
#   golden_answer_keywords:   strings the correct answer should contain (case-insensitive substring match)
#   demonstrates_feature:     baseline | hybrid | rerank | hyde | crag | self_rag | sql | hybrid_rag_sql | wild
#   expected_baseline:        pass | fail   — does the naive RAG profile pass this Q?
#   expected_with_feature:    pass          — does the targeted-feature profile pass this Q?
#   notes:                    one-line why this Q exposes the gap (or works)
#
# Profile → expected behavior matrix is encoded by `expected_baseline` and `expected_with_feature`.
# Feature mapping enforced in eval/run_ragas.py via demonstrates_feature.
#
# Validation: all 21 retained originals + 19 new goldens.
# New goldens individually tested against /query API (naive + feature profile).
# See eval/AUTHORING_REPORT.md for validation summary.

